name: sdgnn
ablation_id: b0
# B0 仅代表“SDGNN-compatible”口径：
# - 全局统一 lambda；
# - 使用分层 BFS 候选池上的单次平坦 LARS/Lasso Phase-Theta。
teacher: gcn
lambda_reg: 1.0e-3
lars:
  k: 50
  scheme: bfs_flat_lars_lasso
alternating_opt:
  protocol: b0_flat
  max_outer_iter: 20
  patience: 5
  t_w: 5
  eta_w: 0.005
train:
  lr: 0.005
  weight_decay: 5.0e-4
  dropout: 0.3
  epochs: 200
  early_stopping_patience: 20
