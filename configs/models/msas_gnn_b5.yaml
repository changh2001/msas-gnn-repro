name: msas_gnn_b5
ablation_id: b5
teacher: gcn
frequency:
  mode: equal_weight
node_dim:
  use_spectral_energy: true
  use_centrality: true
  use_kcore: true
  use_entropy: true
  tau_base: 1.0e-3
  tau_min: 1.0e-7
  c_e: 1.0
  beta_tau: 1.0
  gamma: 0.5
  delta: 0.3
  omega_h: 0.2
hop_dim:
  strategy: spectral_gap_reference
  L: 3
  p_base: 0.6
  p_min: 0.1
  kappa: 2.0
  varrho: 0.7
  rho: 1.0
lars:
  k: 50
  scheme: residual_cascade
  theta_solver_mode: residual_cascade
feature_transform:
  init_protocol: ridge_x_to_h_star
  ridge: 1.0e-4
alternating_opt:
  protocol: b5_full
  max_outer_iter: 20
  patience: 5
  t_w: 5
  eta_w: 0.005
train:
  lr: 0.005
  weight_decay: 5.0e-4
  dropout: 0.3
  epochs: 200
  early_stopping_patience: 20
